<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }
        h1 {
            margin-top: 30px;
        }
        form {
            margin: 20px;
        }
        input {
            padding: 12px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 12px;
            background: #00c9a7;
            border: none;
            color: white;
            border-radius: 5px;
        }
        .task {
            background: white;
            color: black;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
        a {
            color: red;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>NoahIan Tasks</h1>

    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Enter task..." required>
        <button type="submit">Add Task</button>
    </form>

    {% for task in tasks %}
        <div class="task">
            <span>{{ task.title }}</span>
            <a href="/delete/{{ task.id }}">✖</a>
        </div>
    {% endfor %}

</body>
</html>
